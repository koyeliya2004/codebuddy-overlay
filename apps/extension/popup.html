<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 240px; padding: 16px; background: #141414; color: #fff; font-family: Inter, system-ui; }
    h2 { font-size: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    p { font-size: 11px; color: #737373; line-height: 1.5; }
    .kbd { background: #2d2d2d; padding: 2px 6px; border-radius: 4px; font-size: 10px; color: #a3a3a3; }
    .tip { margin-top: 10px; padding: 8px; background: #1f1f1f; border-radius: 8px; border: 1px solid #2d2d2d; }
  </style>
</head>
<body>
  <h2>🤖 CodeBuddy</h2>
  <p>AI coding assistant powered by Groq</p>
  <div class="tip">
    <p><kbd class="kbd">Ctrl+Shift+C</kbd> — Capture & analyze</p>
    <p style="margin-top:6px;">Or click the 🤖 bubble on any page</p>
  </div>
  <div class="tip" style="margin-top:8px;">
    <p>Make sure your backend is running on <code style="color:#4f98a3;">localhost:8000</code></p>
  </div>
</body>
</html>
